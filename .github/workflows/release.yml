name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_TARGET: x86_64-pc-windows-msvc

jobs:
  release:
    name: Build and publish justsay.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add $env:RUST_TARGET

      - name: Restore Cargo dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-

      - name: Install UPX
        shell: pwsh
        run: choco install upx -y

      - name: Test
        shell: pwsh
        run: cargo test --locked --target $env:RUST_TARGET

      - name: Build
        shell: pwsh
        run: cargo build --release --locked --target $env:RUST_TARGET

      - name: Prepare compressed executable
        id: artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $asset = "dist/justsay.exe"
          Copy-Item "target/$env:RUST_TARGET/release/justsay.exe" $asset -Force
          upx --best $asset
          "asset=$asset" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "${{ steps.artifact.outputs.asset }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release view $tag --json assets --jq '.assets[].name' |
              ForEach-Object { gh release delete-asset $tag $_ --yes }
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title $tag --notes "Automated release for $tag."
          }
